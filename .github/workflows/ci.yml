name: C++ CI with Clang, Ninja and Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest  # 로컬과 동일하게 윈도우 환경 사용

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/b_cache

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    # 1. LLVM (Clang) & Ninja 설치
    - name: Install LLVM and Ninja
      run: |
        choco install llvm -y
        choco install ninja -y
      shell: powershell

    # 2. Cppcheck 설치
    - name: Install Cppcheck
      run: choco install cppcheck -y
      shell: powershell

