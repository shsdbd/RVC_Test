name: C++ CI with Clang, Ninja and Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest  # 로컬과 동일하게 윈도우 환경 사용

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    # 1. LLVM (Clang) & Ninja 설치
    - name: Install LLVM, Ninja, and Cppcheck
      run: |
        choco install llvm -y
        choco install ninja -y
        choco install cppcheck -y  # 여기서 새로 깔리는 버전이 C:\Program Files\Cppcheck 에 위치합니다.
      shell: powershell

    # 2. Cppcheck 설치
    - name: Install Cppcheck
      run: choco install cppcheck -y
      shell: powershell

    # 3. vcpkg 캐싱 (빌드 속도 향상)
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg
          ${{ github.workspace }}/vcpkg_installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}

    # 4. vcpkg 설치 및 GTest 준비
    # 4. vcpkg 설치 및 GTest 준비 (절대 경로 및 파일 체크 버전)
    - name: Setup vcpkg and Install Dependencies
      run: |
        $VCPKG_PATH = "${{ github.workspace }}\vcpkg"
        $CACHE_PATH = "$VCPKG_PATH\b_cache"
        $VCPKG_EXE = "$VCPKG_PATH\vcpkg.exe"

        if (!(Test-Path $CACHE_PATH)) {
            New-Item -ItemType Directory -Force -Path $CACHE_PATH
        }

        if (!(Test-Path $VCPKG_EXE)) {
            if (Test-Path $VCPKG_PATH) { Remove-Item -Recurse -Force $VCPKG_PATH }
            git clone https://github.com/microsoft/vcpkg.git $VCPKG_PATH
            & "$VCPKG_PATH\bootstrap-vcpkg.bat"
        }

        & $VCPKG_EXE install --triplet x64-windows --vcpkg-root $VCPKG_PATH --binarysource="clear;files,$CACHE_PATH,readwrite"
      shell: powershell

    - name: Cleanup build directory
      run: if (Test-Path build) { Remove-Item -Recurse -Force build }
      shell: powershell
    # 5. CMake 구성 (vcpkg 툴체인 경로 정확히 지정)
    - name: Configure CMake
      run: >
        cmake -G "Ninja" -B build
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        -DCMAKE_CXX_CPPCHECK="C:/Program Files/Cppcheck/cppcheck.exe;--enable=all;--inconclusive;--force;--inline-suppr;--error-exitcode=1;--suppress=missingIncludeSystem"
      shell: powershell

    # 6. 구글 테스트 실행 (강력한 경로 추적 버전)
    - name: Run Tests
      run: |
        # 실행 데이터 파일명 설정
        $env:LLVM_PROFILE_FILE = "${{ github.workspace }}\default.profraw"
        
        # 1. 빌드 결과물 경로 확인 (Ninja는 보통 build/ 아래 바로 생성)
        $TEST_EXE = "${{ github.workspace }}\build\run_tests.exe"
        
        if (!(Test-Path $TEST_EXE)) {
            Write-Host "Searching for run_tests.exe in subdirectories..."
            $TEST_EXE = (Get-ChildItem -Path "${{ github.workspace }}\build" -Filter "run_tests.exe" -Recurse).FullName[0]
        }

        if ($TEST_EXE -and (Test-Path $TEST_EXE)) {
            Write-Host "Executing test: $TEST_EXE"
            # & 연산자를 사용하여 실행
            & $TEST_EXE
            Start-Sleep -s 2
        } else {
            Write-Error "Could not find run_tests.exe! Build might have failed or output path is wrong."
            exit 1
        }
      shell: powershell

    # 7. 커버리지 리포트 생성 (루트 경로의 profraw 사용)
    - name: Generate Coverage Report
      run: |
        $PROFRAW = "default.profraw"
        $PROFDATA = "default.profdata"
        
        # 1. profraw 파일이 있는지 확인
        if (Test-Path $PROFRAW) {
            Write-Host "Found $PROFRAW. Generating report..."
            
            # 데이터 병합
            & "C:\Program Files\LLVM\bin\llvm-profdata.exe" merge -sparse $PROFRAW -o $PROFDATA
            
            # 상세 리포트 생성 (다운로드용)
            & "C:\Program Files\LLVM\bin\llvm-cov.exe" show ./build/run_tests.exe -instr-profile=$PROFDATA > coverage_report.txt
            
            # 요약 리포트 출력 (GitHub Actions 로그 확인용)
            & "C:\Program Files\LLVM\bin\llvm-cov.exe" report ./build/run_tests.exe -instr-profile=$PROFDATA
        } else {
            Write-Error "Error: $PROFRAW not found! Test execution might have failed to generate profile data."
            exit 1
        }
      shell: powershell

    # 8. 리포트 파일을 GitHub Artifact로 업로드 (다운로드 가능하게 만듦)
    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: coverage_report.txt