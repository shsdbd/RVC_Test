name: C++ CI with Clang, Ninja and Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest  # 로컬과 동일하게 윈도우 환경 사용

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0  # 이 부분을 추가하여 전체 커밋 기록을 가져옵니다.

    # 1. LLVM (Clang) & Ninja 설치
    - name: Install LLVM, Ninja, and Cppcheck
      run: |
        choco install llvm -y
        choco install ninja -y
        choco install cppcheck -y  # 여기서 새로 깔리는 버전이 C:\Program Files\Cppcheck 에 위치합니다.
      shell: powershell

    # 2. Cppcheck 설치
    - name: Install Cppcheck
      run: choco install cppcheck -y
      shell: powershell

    # 3. vcpkg 캐싱 (빌드 속도 향상)
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg
          ${{ github.workspace }}/vcpkg_installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}

    # 4. vcpkg 설치 및 GTest 준비
    # 4. vcpkg 설치 및 GTest 준비 (절대 경로 및 파일 체크 버전)
    - name: Setup vcpkg and Install Dependencies
      run: |
        $VCPKG_PATH = "${{ github.workspace }}\vcpkg"
        $CACHE_PATH = "$VCPKG_PATH\b_cache"
        $VCPKG_EXE = "$VCPKG_PATH\vcpkg.exe"

        if (!(Test-Path $CACHE_PATH)) {
            New-Item -ItemType Directory -Force -Path $CACHE_PATH
        }

        if (!(Test-Path $VCPKG_EXE)) {
            if (Test-Path $VCPKG_PATH) { Remove-Item -Recurse -Force $VCPKG_PATH }
            git clone https://github.com/microsoft/vcpkg.git $VCPKG_PATH
            & "$VCPKG_PATH\bootstrap-vcpkg.bat"
        }

        & $VCPKG_EXE install --triplet x64-windows --vcpkg-root $VCPKG_PATH --binarysource="clear;files,$CACHE_PATH,readwrite"
      shell: powershell

    - name: Cleanup build directory
      run: if (Test-Path build) { Remove-Item -Recurse -Force build }
      shell: powershell
    # 5. CMake 구성 (vcpkg 툴체인 경로 정확히 지정)
    - name: Configure CMake
      run: >
        cmake -G "Ninja" -B build
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        -DCMAKE_CXX_CPPCHECK="C:/Program Files/Cppcheck/cppcheck.exe;--enable=all;--inconclusive;--force;--inline-suppr;--error-exitcode=1;--suppress=missingIncludeSystem"
      shell: powershell

    # [추가된 단계] 6. 실제 빌드 수행
    - name: Build
      run: cmake --build build --target run_tests
      shell: powershell
    # 6. 구글 테스트 실행 (강력한 경로 추적 버전)
    - name: Run Tests
      run: |
        $env:LLVM_PROFILE_FILE = "${{ github.workspace }}\default.profraw"
        $BUILD_DIR = "${{ github.workspace }}\build"

        # 1. 파일 목록 출력 (디버깅용: 파일이 어디에 생겼는지 로그로 확인 가능)
        Write-Host "Listing files in build directory for debugging:"
        Get-ChildItem -Path $BUILD_DIR -Recurse -Filter "*.exe" | Select-Object FullName

        # 2. run_tests.exe 찾기
        $testExeObject = Get-ChildItem -Path $BUILD_DIR -Filter "run_tests.exe" -Recurse
        
        if ($testExeObject) {
            # 만약 여러 개가 나오면 첫 번째 파일을 사용
            $TEST_EXE = if ($testExeObject.Count -gt 1) { $testExeObject[0].FullName } else { $testExeObject.FullName }
            Write-Host "Executing test: $TEST_EXE"
            & $TEST_EXE
            Start-Sleep -s 2
        } else {
            Write-Error "CRITICAL: run_tests.exe not found anywhere in build directory!"
            exit 1
        }
      shell: powershell
    # 7. 커버리지 리포트 생성 (루트 경로의 profraw 사용)
    - name: Generate Coverage Report
      run: |
        $PROFRAW = "${{ github.workspace }}\default.profraw"
        $PROFDATA = "${{ github.workspace }}\default.profdata"
        $REPORT_FILE = "${{ github.workspace }}\coverage_report.txt"
        $TEST_EXE = "${{ github.workspace }}\build\run_tests.exe"
        
        if (Test-Path $PROFRAW) {
            Write-Host "Found $PROFRAW. Generating report..."
            
            # 1. 데이터 병합 (절대 경로 사용)
            & "C:\Program Files\LLVM\bin\llvm-profdata.exe" merge -sparse "$PROFRAW" -o "$PROFDATA"
            
            # 2. 상세 리포트 생성
            & "C:\Program Files\LLVM\bin\llvm-cov.exe" show "$TEST_EXE" -instr-profile="$PROFDATA" > "$REPORT_FILE"
            
            # 3. 요약 리포트 출력
            & "C:\Program Files\LLVM\bin\llvm-cov.exe" report "$TEST_EXE" -instr-profile="$PROFDATA"
        } else {
            Write-Error "Error: $PROFRAW not found!"
            exit 1
        }
      shell: powershell

    # 8. 리포트 파일을 GitHub Artifact로 업로드 (다운로드 가능하게 만듦)
    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: coverage_report.txt
    # 9. SonarCloud 분석 수행 (공식 액션 사용)
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        # 분석 설정 (sonar-project.properties 파일을 만들지 않았다면 여기서 직접 지정)
        args: >
          -Dsonar.projectKey=shsdbd_RVC_Test
          -Dsonar.organization=shsdbd
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.cfamily.compile-commands=build/compile_commands.json
          -Dsonar.cpp.llvm.cov.reportPath=coverage_report.txt
          -Dsonar.host.url=https://sonarcloud.io